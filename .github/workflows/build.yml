name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Set up Android SDK manually
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk

          # Download and install cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $SDK_ROOT/cmdline-tools
          unzip -q cmdtools.zip -d $SDK_ROOT/cmdline-tools
          mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest

          # Create legacy tools/bin symlink so buildozer finds sdkmanager
          mkdir -p $SDK_ROOT/tools/bin
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/avdmanager  $SDK_ROOT/tools/bin/avdmanager

          export PATH=$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$PATH
          export ANDROID_SDK_ROOT=$SDK_ROOT

          # Accept all licenses
          yes | sdkmanager --sdk_root=$SDK_ROOT --licenses || true

          # Install required packages
          sdkmanager --sdk_root=$SDK_ROOT \
            "build-tools;33.0.2" \
            "platform-tools" \
            "platforms;android-33"

          # Write license files manually as extra safety
          mkdir -p $SDK_ROOT/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e' \
            > $SDK_ROOT/licenses/android-sdk-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > $SDK_ROOT/licenses/android-googletv-license
          printf '\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a' \
            > $SDK_ROOT/licenses/android-sdk-preview-license

          echo "SDK setup done. Contents:"
          ls $SDK_ROOT

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('buildozer.spec') }}-v2

      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/tools/bin:$PATH
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: car-price-expert-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
